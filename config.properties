# ──────────────────────────────────────────────────────────────────────────────
# config.properties — default configuration (dev / local environment)
# Override any key via a JVM system property: -Dbase.url=https://...
# ──────────────────────────────────────────────────────────────────────────────

environment=development

# Target API
base.url=https://jsonplaceholder.typicode.com
api.version=

# Timeouts (seconds)
timeout.seconds=10

# Auth tokens — replace with real values or inject via CI/CD secrets
auth.admin.token=your_admin_bearer_token_here
auth.user.token=your_user_bearer_token_here
auth.invalid.token=invalid_token_for_testing_401
